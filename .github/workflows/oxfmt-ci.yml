name: oxfmt ecosystem ci

on:
  schedule:
    - cron: "30 1,7,13,19 * * *" # Every 6 hours, gaps in the oxlint-ci
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs: # for create comment action https://github.com/peter-evans/create-or-update-comment?tab=readme-ov-file#action-inputs
      issue-number:
        required: false
        type: string
        description: "The issue or pull request number to comment on."
      comment-id:
        required: false
        type: string
        description: "The ID of an existing comment to update."
      ref:
        required: false
        type: string
        default: "main"
        description: "The git ref to build oxfmt from."

permissions: {}

jobs:
  reply:
    name: Reply
    if: ${{ inputs.issue-number && inputs.comment-id }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: oxc-project
          repositories: |
            ${{ github.event.repository.name }}
            oxc

      - uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: oxc-project/oxc
          issue-number: ${{ inputs.issue-number }}
          comment-id: ${{ inputs.comment-id }}
          reactions: eyes

  build:
    name: Build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: oxc-project/oxc
          ref: ${{ inputs.ref }}
          persist-credentials: false
          show-progress: false

      - uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          save-cache: ${{ github.ref_name == 'main' }}

      - uses: oxc-project/setup-node@ab97f03642370d79a7e96dd286bd02a1be40e0ba # v1.3.0

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - run: pnpm install

      # Equivalent to `pnpm build` with `detect_code_removal` feature
      - run: pnpm --filter ./apps/oxfmt run build-napi --release --features allocator,detect_code_removal
        env:
          RUSTFLAGS: "-C debug-assertions=true"
      - run: pnpm --filter ./apps/oxfmt run build-js

      # `pnpm pack` does not work for `apps/oxfmt` because:
      # - `.node` is ignored, not being packed
      # - Also, `bin` field does not exist
      # Instead, using `npm/oxfmt` for global CLI install
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: error
          name: oxfmt
          path: |
            ./apps/oxfmt/dist
            ./npm/oxfmt/package.json
            ./npm/oxfmt/bin

  checkout:
    name: Read oxfmt-matrix.json
    needs: build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.setmatrix.outputs.content }}
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - id: setmatrix
        uses: jaywcjlove/github-action-read-file@c50cc45a16e8a285a7c7c2909748d4ab2333061e # main
        with:
          localfile: ./oxfmt-matrix.json

  test:
    needs: checkout
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.checkout.outputs.matrix) }}
    name: Test ${{ matrix.repository }}
    steps:
      - name: Clone ${{ matrix.repository }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: ${{ matrix.path }}
          persist-credentials: false
          show-progress: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: oxfmt
          path: oxfmt-package

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          version: 11

      # `setup` must run before oxfmt is staged.
      # So that deps provided by the target repo end up in `node_modules/`,
      # where they are reachable from oxfmt's CLI via Node's upward `node_modules` lookup.
      # This is needed for `vite-plus` in Vite+ repo to load config, other deps imported by JS configs.
      - name: Setup target repo
        if: ${{ matrix.setup }}
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.setup }}

      # Add target repo's local bin to PATH so subsequent steps can invoke `oxfmt` without a path prefix,
      # even though it's installed locally rather than globally.
      - name: Configure PATH for local oxfmt
        run: echo "$GITHUB_WORKSPACE/${{ matrix.path }}/node_modules/.bin" >> "$GITHUB_PATH"

      # --- Phase 1: oxfmt@latest (informational, never fails the job) ---
      - name: Install oxfmt@latest
        id: install-latest
        continue-on-error: true
        run: |
          npm pack oxfmt@latest --pack-destination /tmp
          mkdir -p oxfmt-latest-install
          tar -xzf /tmp/oxfmt-*.tgz -C oxfmt-latest-install --strip-components=1
          rm /tmp/oxfmt-*.tgz
          npm install --prefix oxfmt-latest-install --no-audit --no-fund
          mkdir -p "${{ matrix.path }}/node_modules/.bin"
          rm -rf "${{ matrix.path }}/node_modules/oxfmt"
          mv oxfmt-latest-install "${{ matrix.path }}/node_modules/oxfmt"
          ln -sf ../oxfmt/bin/oxfmt "${{ matrix.path }}/node_modules/.bin/oxfmt"

      # oxfmt itself exits with 1 or 2 on errors; a panic (`panic = "abort"` build)
      # dies by signal, so exit code >= 128 (134 = SIGABRT) means a panic.
      - name: Run oxfmt@latest
        id: run-latest
        if: steps.install-latest.outcome == 'success'
        working-directory: ${{ matrix.path }}
        continue-on-error: true
        run: |
          ${{ matrix.command }} || EXIT_CODE=$?
          echo "exit-code=${EXIT_CODE:-0}" >> "$GITHUB_OUTPUT"
          exit "${EXIT_CODE:-0}"

      - name: Check diff (oxfmt@latest vs repo)
        id: check-latest
        if: steps.install-latest.outcome == 'success'
        continue-on-error: true
        working-directory: ${{ matrix.path }}
        run: |
          git diff > /tmp/latest.diff
          if [ -s /tmp/latest.diff ]; then
            echo "$(oxfmt --version) (latest) produces diff from repo."
            ver=$(grep '"oxfmt":' package.json 2>/dev/null || echo "not found")
            if echo "$ver" | grep -q 'catalog:'; then
              echo "Repo's oxfmt version: $(grep 'oxfmt:' pnpm-workspace.* 2>/dev/null)"
            else
              echo "Repo's oxfmt version: $ver"
            fi
            git --no-pager diff
            exit 1
          fi

      # `git checkout -- .` does not touch `node_modules/`,
      # so the target's setup output (and Phase 1's installed oxfmt) survives;
      # Phase 2 overwrites just oxfmt.
      - name: Reset working tree
        if: ${{ !cancelled() }}
        working-directory: ${{ matrix.path }}
        run: git checkout -- .

      # --- Phase 2: main branch oxfmt (always runs unless cancelled) ---
      - name: Install oxfmt (main branch)
        if: ${{ !cancelled() }}
        run: |
          # `pnpm pack` does not work for `apps/oxfmt` (`.node` ignored, no `bin` field),
          # so we reconstruct the package layout manually from build artifacts.
          mkdir -p oxfmt-install
          cp oxfmt-package/npm/oxfmt/package.json oxfmt-install/
          cp -r oxfmt-package/npm/oxfmt/bin oxfmt-install/
          cp -r oxfmt-package/apps/oxfmt/dist oxfmt-install/
          # `actions/upload-artifact` strips the POSIX executable bit, so restore it.
          chmod +x oxfmt-install/bin/oxfmt
          npm install --prefix oxfmt-install --no-audit --no-fund
          mkdir -p "${{ matrix.path }}/node_modules/.bin"
          rm -rf "${{ matrix.path }}/node_modules/oxfmt"
          mv oxfmt-install "${{ matrix.path }}/node_modules/oxfmt"
          ln -sf ../oxfmt/bin/oxfmt "${{ matrix.path }}/node_modules/.bin/oxfmt"

      - name: Run oxfmt (main branch)
        id: run-main
        if: ${{ !cancelled() }}
        working-directory: ${{ matrix.path }}
        continue-on-error: true
        run: |
          ${{ matrix.command }} || EXIT_CODE=$?
          echo "exit-code=${EXIT_CODE:-0}" >> "$GITHUB_OUTPUT"
          exit "${EXIT_CODE:-0}"

      - name: Check diff (main branch vs oxfmt@latest)
        if: ${{ !cancelled() }}
        working-directory: ${{ matrix.path }}
        env:
          OXFMT_REF: ${{ inputs.ref || 'main' }}
          LATEST_EXIT: ${{ steps.run-latest.outputs.exit-code }}
          MAIN_EXIT: ${{ steps.run-main.outputs.exit-code }}
        run: |
          git diff > /tmp/main.diff
          if [ "$MAIN_EXIT" != "$LATEST_EXIT" ]; then
            echo "$(oxfmt --version) ($OXFMT_REF branch) exit code ($MAIN_EXIT) differs from oxfmt@latest ($LATEST_EXIT)."
            exit 1
          fi
          if ! diff -q /tmp/latest.diff /tmp/main.diff > /dev/null 2>&1; then
            echo "$(oxfmt --version) ($OXFMT_REF branch) differs from oxfmt@latest:"
            diff /tmp/latest.diff /tmp/main.diff || true
            exit 1
          fi

      - name: Fail if oxfmt@latest panicked
        if: steps.run-latest.outcome == 'failure' && fromJSON(steps.run-latest.outputs.exit-code) >= 128
        run: |
          echo "Failing because oxfmt@latest panicked during execution (see Phase 1 above)."
          exit 1

      - name: Fail if oxfmt@latest errored
        if: steps.run-latest.outcome == 'failure' && fromJSON(steps.run-latest.outputs.exit-code) < 128
        run: |
          echo "Failing because oxfmt@latest exited with an error, e.g. parse error (see Phase 1 above)."
          exit 1

      - name: Fail if oxfmt (main branch) panicked
        if: ${{ !cancelled() && steps.run-main.outcome == 'failure' && fromJSON(steps.run-main.outputs.exit-code) >= 128 }}
        run: |
          echo "Failing because oxfmt (main branch) panicked during execution (see Phase 2 above)."
          exit 1

      # An error in main branch is a regression only when oxfmt@latest did not fail the same way.
      # If both exit with the same code, this falls through to `Check diff (main branch vs oxfmt@latest)`.
      - name: Fail if oxfmt (main branch) errored
        if: ${{ !cancelled() && steps.run-main.outcome == 'failure' && fromJSON(steps.run-main.outputs.exit-code) < 128 && steps.run-main.outputs.exit-code != steps.run-latest.outputs.exit-code }}
        run: |
          echo "Failing because oxfmt (main branch) exited with an error, e.g. parse error (see Phase 2 above)."
          exit 1

      - name: Fail if oxfmt@latest differs from repo
        if: steps.check-latest.outcome == 'failure'
        run: |
          echo "Failing because oxfmt@latest produced a diff from the repo (see Phase 1 above)."
          exit 1

  comment:
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Reply Comment
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: oxc-project
          repositories: |
            ${{ github.event.repository.name }}
            oxc

      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        id: script
        env:
          INPUT_REF: ${{ inputs.ref || 'main' }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          result-encoding: string
          script: |
            const {
              data: { jobs },
            } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const emoji = {
              success: ":white_check_mark:",
              failure: ":x:",
              cancelled: ":stop_button:",
              skipped: ":white_check_mark:",
            };
            const stepConclusion = (job, stepName) => {
              const step = job.steps?.find((s) => s.name === stepName);
              if (!step) return emoji.skipped;
              return emoji[step.conclusion] ?? `:grey_question:`;
            };
            const phaseConclusion = (job, panicStep, errorStep, diffStep) => {
              const panic = job.steps?.find((s) => s.name === panicStep);
              if (panic?.conclusion === "failure") return ":boom:";
              const error = job.steps?.find((s) => s.name === errorStep);
              if (error?.conclusion === "failure") return ":warning:";
              return stepConclusion(job, diffStep);
            };
            let result = jobs
              .filter((job) => job.name.startsWith("Test "))
              .map((job) => {
                const suite = job.name.slice(5);
                return {
                  suite,
                  latest: phaseConclusion(job, "Fail if oxfmt@latest panicked", "Fail if oxfmt@latest errored", "Fail if oxfmt@latest differs from repo"),
                  main: phaseConclusion(job, "Fail if oxfmt (main branch) panicked", "Fail if oxfmt (main branch) errored", "Check diff (main branch vs oxfmt@latest)"),
                  link: job.html_url,
                };
              });
            const url = `${context.serverUrl}//${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const urlLink = `[Open](${url})`;
            const ref = process.env.INPUT_REF || "main";
            const body = `
            ## [Oxfmt Ecosystem CI](${urlLink})
            | suite | oxfmt@latest | ${ref} branch |
            |-------|:---:|:---:|
            ${result.map((r) => `| [${r.suite}](${r.link}) | ${r.latest} | ${r.main} |`).join("\n")}

            :boom: = panic, :warning: = error e.g. parse error (branch column: only new errors), :x: = diff or exit code mismatch
            `;
            await core.summary.addRaw(body).write();
            return body;

      - uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        if: ${{ inputs.issue-number && inputs.comment-id }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: oxc-project/oxc
          issue-number: ${{ inputs.issue-number }}
          comment-id: ${{ inputs.comment-id }}
          body: ${{ steps.script.outputs.result }}
          edit-mode: replace
